<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">バツどこ？の動作イメージ</title>
  <desc id="desc">広告やポップアップの閉じるボタン候補を赤い番号付きリングで表示するChrome拡張機能の説明画像。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#111827" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="66" y="54" width="1068" height="560" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="66" y="54" width="1068" height="58" rx="18" fill="#1f2937"/>
  <path d="M66 92 H1134 V112 H66 Z" fill="#1f2937"/>
  <circle cx="98" cy="83" r="8" fill="#fecaca"/>
  <circle cx="124" cy="83" r="8" fill="#fde68a"/>
  <circle cx="150" cy="83" r="8" fill="#bbf7d0"/>
  <rect x="190" y="70" width="660" height="28" rx="14" fill="#f3f4f6"/>
  <text x="214" y="90" fill="#4b5563" font-size="15" font-family="Meiryo, Yu Gothic, Arial, sans-serif">ニュース記事ページ</text>
  <text x="1088" y="90" text-anchor="end" fill="#f9fafb" font-size="18" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">バツどこ？</text>

  <rect x="108" y="144" width="705" height="410" rx="10" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="148" y="198" fill="#111827" font-size="30" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">読みたい記事のタイトル</text>
  <rect x="148" y="232" width="570" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="148" y="266" width="610" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="148" y="300" width="530" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="148" y="354" width="270" height="150" rx="10" fill="#dbeafe"/>
  <rect x="448" y="354" width="270" height="150" rx="10" fill="#e0f2fe"/>

  <rect x="420" y="190" width="382" height="258" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="420" y="190" width="382" height="62" rx="18" fill="#fef2f2"/>
  <path d="M420 232 H802 V252 H420 Z" fill="#fef2f2"/>
  <text x="448" y="228" fill="#991b1b" font-size="22" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">広告・ポップアップ</text>
  <rect x="462" y="288" width="298" height="22" rx="11" fill="#e5e7eb"/>
  <rect x="462" y="328" width="250" height="22" rx="11" fill="#e5e7eb"/>
  <rect x="462" y="382" width="128" height="42" rx="21" fill="#f97316"/>
  <text x="526" y="410" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">詳しく見る</text>

  <circle cx="777" cy="214" r="28" fill="none" stroke="#ef4444" stroke-width="7"/>
  <circle cx="777" cy="214" r="15" fill="#ef4444"/>
  <text x="777" y="221" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" font-family="Arial, sans-serif">1</text>
  <text x="777" y="202" text-anchor="middle" fill="#7f1d1d" font-size="20" font-weight="700" font-family="Arial, sans-serif">×</text>

  <circle cx="440" cy="212" r="25" fill="none" stroke="#ef4444" stroke-width="7"/>
  <circle cx="440" cy="212" r="14" fill="#ef4444"/>
  <text x="440" y="218" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700" font-family="Arial, sans-serif">2</text>

  <rect x="850" y="154" width="238" height="78" rx="18" fill="#fee2e2" stroke="#fecaca"/>
  <text x="969" y="188" text-anchor="middle" fill="#991b1b" font-size="21" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">候補を赤リング表示</text>
  <text x="969" y="217" text-anchor="middle" fill="#b91c1c" font-size="16" font-family="Meiryo, Yu Gothic, Arial, sans-serif">番号付きで分かりやすく</text>

  <rect x="846" y="280" width="250" height="128" rx="20" fill="#ecfdf5" stroke="#86efac"/>
  <text x="971" y="320" text-anchor="middle" fill="#14532d" font-size="22" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">自動クリックしません</text>
  <text x="971" y="354" text-anchor="middle" fill="#166534" font-size="17" font-family="Meiryo, Yu Gothic, Arial, sans-serif">ユーザーが確認して</text>
  <text x="971" y="383" text-anchor="middle" fill="#166534" font-size="17" font-family="Meiryo, Yu Gothic, Arial, sans-serif">必要な候補だけクリック</text>

  <rect x="844" y="455" width="252" height="72" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="970" y="486" text-anchor="middle" fill="#1e3a8a" font-size="18" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">12秒後に自動消去</text>
  <text x="970" y="512" text-anchor="middle" fill="#1d4ed8" font-size="15" font-family="Meiryo, Yu Gothic, Arial, sans-serif">ページ内容は外部送信しません</text>

  <rect x="120" y="574" width="960" height="30" rx="15" fill="#fee2e2"/>
  <text x="600" y="596" text-anchor="middle" fill="#991b1b" font-size="17" font-weight="700" font-family="Meiryo, Yu Gothic, Arial, sans-serif">広告やポップアップの「閉じるボタン候補」を探して、赤いリングで表示します</text>
</svg>
